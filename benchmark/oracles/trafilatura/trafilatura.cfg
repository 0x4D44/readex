; mdrcel Trafilatura oracle adapter — EXPLICIT COMMITTED CONFIG (HLD section 4).
;
; Never ambient: run.py loads THIS file by absolute path so extraction is not
; influenced by any user/global Trafilatura config on the host. configparser
; keys are case-insensitive. Every value below is the Trafilatura 2.0.0
; PACKAGED DEFAULT verbatim (read off the pinned install on the declared host:
; Python 3.12.10, Windows 11, 2026-05-17) EXCEPT the two override blocks
; called out by comment, so a future upstream default change cannot silently
; move `text`.
[DEFAULT]

; --- OVERRIDDEN (vs packaged default 30) -----------------------------------
; Disable the signal-based extraction timeout. SIGALRM is POSIX-only and
; unusable on the Windows CI host; a wall-clock cutoff would also make `text`
; non-deterministic run-to-run (HLD section 3.5: no clock in emitted fields).
EXTRACTION_TIMEOUT = 0

; --- OVERRIDDEN: dedup made inert, defence-in-depth (HLD section 4) ---------
; Trafilatura's dedup LRU is module-level, stateful and non-deterministic
; across documents in one process. run.py ALSO passes deduplicate=False; this
; config mirror makes the size-gated dedup check unreachable regardless
; (packaged default min_duplcheck_size=100).
MIN_DUPLCHECK_SIZE = 999999999

; --- PINNED to the packaged 2.0.0 defaults, verbatim -----------------------
MAX_REPETITIONS = 2
MIN_EXTRACTED_SIZE = 250
MIN_EXTRACTED_COMM_SIZE = 1
MIN_OUTPUT_SIZE = 1
MIN_OUTPUT_COMM_SIZE = 1
EXTENSIVE_DATE_SEARCH = on
MAX_FILE_SIZE = 20000000
MIN_FILE_SIZE = 10
