# Schema.org coverage (the byte-faithful subset of `json_metadata.py`):
# - **Article-like types** (`Article`/`NewsArticle`/`BlogPosting`/
#   `ScholarlyArticle`/`SocialMediaPosting`/`LiveBlogPosting`/
